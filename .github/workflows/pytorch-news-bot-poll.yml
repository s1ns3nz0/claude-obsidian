name: PyTorchKR news bot poll

# Telegram 봇에게 /news, /list, "목록" 등을 보내면 5분 이내에 현재 게시판
# 목록으로 답장하는 폴링 워크플로. (Telegram 실시간 웹훅 대신 주기적 폴링 방식)
# 필요한 시크릿은 pytorch-news-notify.yml과 동일:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: "*/5 * * * *" # 5분마다 확인 (GitHub Actions 최소 간격)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Poll Telegram and reply to on-demand commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/pytorch-news-bot-poll.py

      - name: Commit updated offset
        run: |
          git config user.name "pytorch-news-bot"
          git config user.email "pytorch-news-bot@users.noreply.github.com"
          git add .vault-meta/telegram-update-offset.json
          if git diff --cached --quiet; then
            echo "No offset changes."
            exit 0
          fi
          git commit -m "chore: update telegram update offset"
          git push
