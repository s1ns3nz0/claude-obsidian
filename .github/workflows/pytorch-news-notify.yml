name: PyTorchKR news notify

# 매일 discuss.pytorch.kr/c/news/14 를 확인해서 새 글이 있으면 Telegram으로 알림.
# 필요한 시크릿 (Settings > Secrets and variables > Actions > Secrets):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: "40 10 * * *" # TEMP: 오늘 19:40 KST 테스트용 (UTC 10:40). 확인 후 "0 23 * * *"(KST 08:00)로 되돌리세요.
  workflow_dispatch: {} # Actions 탭에서 수동 실행(테스트)도 가능

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for new PyTorchKR posts and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/pytorch-news-notify.py

      - name: Commit updated state
        run: |
          git config user.name "pytorch-news-bot"
          git config user.email "pytorch-news-bot@users.noreply.github.com"
          git add .vault-meta/pytorch-news-seen.json
          if git diff --cached --quiet; then
            echo "No state changes."
            exit 0
          fi
          git commit -m "chore: update pytorch news seen state"
          git push
